<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharkNet Discussions</title>
    <link rel="stylesheet" href="../css/homepage.css">
    <link rel="stylesheet" href="../css/discussions.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="welcome-message">
            <h1>SharkNet Discussions</h1>
            <p>Join conversations and help each other learn.</p>
        </div>
        <nav class="nav-buttons">
            <button onclick="location.href='home.html'">Home</button>
            <button onclick="location.href='discussions.html'">Discussions</button>
            <button onclick="location.href='tutors.html'">Tutors</button>
        </nav>
    </header>

    <main>

        <!-- Majors Grid -->
        <section class="majors-section" id="majors-section">
            <h2 class="section-title">Browse by Major</h2>
            <div class="majors-grid">
                <div class="major-card" onclick="location.href='discussions.html?major=Computer+Science'">Computer Science</div>
                <div class="major-card" onclick="location.href='discussions.html?major=Biology'">Biology</div>
                <div class="major-card" onclick="location.href='discussions.html?major=Psychology'">Psychology</div>
                <div class="major-card" onclick="location.href='discussions.html?major=Engineering'">Engineering</div>
                <div class="major-card" onclick="location.href='discussions.html?major=Business'">Business</div>
                <div class="major-card" onclick="location.href='discussions.html?major=Nursing'">Nursing</div>
                <div class="major-card coming-soon">More majors coming soon...</div>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 SharkNet • Prototype</p>
    </footer>


<script>
/*
========================================================
DISCUSSIONS PAGE LOGIC
========================================================
This script:
1. Detects which major the user clicked
2. Loads all discussion posts for that major from the backend
3. Lets users create new questions
4. Lets users reply to questions
5. Lets users reply to replies (nested replies)
========================================================
*/

const params = new URLSearchParams(window.location.search);
const major = params.get("major");

/*
--------------------------------------------------------
Helper function:
Creates a reply form block for either a question reply
or a nested reply.
--------------------------------------------------------
*/
function createReplyForm({ discussionId, parentReplyId = null, onSuccess }) {
    const wrapper = document.createElement("div");
    wrapper.className = "reply-form-wrapper";

    const textarea = document.createElement("textarea");
    textarea.placeholder = parentReplyId ? "Write a reply to this reply..." : "Write a reply...";
    textarea.rows = 3;

    const button = document.createElement("button");
    button.textContent = "Post Reply";
    button.className = "post-reply";

    button.addEventListener("click", async () => {
        const replyText = textarea.value.trim();

        if (!replyText) {
            alert("Please write a reply first.");
            return;
        }

        try {
            const response = await fetch("/api/replies", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    discussion_id: discussionId,
                    parent_reply_id: parentReplyId,
                    reply_text: replyText
                })
            });

            const result = await response.json();

            if (!response.ok) {
                alert(result.error || "Failed to post reply.");
                return;
            }

            textarea.value = "";

            if (onSuccess) {
                onSuccess();
            }

        } catch (error) {
            console.error("Reply error:", error);
            alert("An error occurred while posting the reply.");
        }
    });

    wrapper.appendChild(textarea);
    wrapper.appendChild(button);

    return wrapper;
}


/*
--------------------------------------------------------
Render replies recursively
This allows "reply to reply" behavior.
--------------------------------------------------------
*/
function renderReplies(replyList, discussionId, reloadDiscussions) {
    const container = document.createElement("div");
    container.className = "replies-container";

    replyList.forEach(reply => {
        const replyCard = document.createElement("div");
        replyCard.className = "reply";

        replyCard.innerHTML = `
            <div class="reply-meta">
                <strong>${reply.author_email}</strong> • ${reply.created_at}
            </div>
            <div class="reply-text">${reply.reply_text}</div>
        `;

        // Button to show nested reply box
        const replyButton = document.createElement("button");
        replyButton.textContent = "Reply";
        replyButton.className = "reply-btn";

        const nestedReplyArea = document.createElement("div");
        nestedReplyArea.className = "nested-reply-area hidden";

        replyButton.addEventListener("click", () => {
            nestedReplyArea.classList.toggle("hidden");
        });

        // Nested reply form
        const nestedReplyForm = createReplyForm({
            discussionId: discussionId,
            parentReplyId: reply.id,
            onSuccess: reloadDiscussions
        });

        nestedReplyArea.appendChild(nestedReplyForm);

        replyCard.appendChild(replyButton);
        replyCard.appendChild(nestedReplyArea);

        // If this reply has child replies, render them inside
        if (reply.children && reply.children.length > 0) {
            const childReplies = renderReplies(reply.children, discussionId, reloadDiscussions);
            childReplies.classList.add("nested-replies");
            replyCard.appendChild(childReplies);
        }

        container.appendChild(replyCard);
    });

    return container;
}


/*
--------------------------------------------------------
Main logic for the major-specific discussion view
--------------------------------------------------------
*/
if (major) {
    const main = document.querySelector("main");
    document.getElementById("majors-section").style.display = "none";

    // Top bar
    const pageTitle = document.createElement("h2");
    pageTitle.textContent = major + " Discussions";
    pageTitle.className = "section-title";

    const backBtn = document.createElement("button");
    backBtn.textContent = "← Back";
    backBtn.className = "back-btn";
    backBtn.onclick = () => location.href = "discussions.html";

    const topBar = document.createElement("div");
    topBar.className = "top-bar";
    topBar.appendChild(backBtn);
    topBar.appendChild(pageTitle);

    main.prepend(topBar);

    // Section where user can create a new question
    const askQuestionSection = document.createElement("section");
    askQuestionSection.className = "discussion-section";

    askQuestionSection.innerHTML = `
        <div class="discussion-card">
            <h3>Ask a Question</h3>
            <textarea id="new-question-text" placeholder="Ask something for ${major}..." rows="4"></textarea>
            <button id="post-question-btn">Post Question</button>
        </div>
    `;

    main.appendChild(askQuestionSection);

    // Section where discussion cards will be displayed
    const discussionSection = document.createElement("section");
    discussionSection.className = "discussion-section";
    main.appendChild(discussionSection);


    /*
    --------------------------------------------------------
    Function to load discussions from backend API
    --------------------------------------------------------
    */
    async function loadDiscussions() {
        discussionSection.innerHTML = "";

        try {
            const response = await fetch(`/api/discussions?major=${encodeURIComponent(major)}`);
            const discussions = await response.json();

            if (!response.ok) {
                alert(discussions.error || "Failed to load discussions.");
                return;
            }

            // If there are no posts yet, show a small message
            if (discussions.length === 0) {
                const emptyMessage = document.createElement("div");
                emptyMessage.className = "discussion-card";
                emptyMessage.innerHTML = `<p>No discussions yet for ${major}. Be the first to ask a question.</p>`;
                discussionSection.appendChild(emptyMessage);
                return;
            }

            discussions.forEach(d => {
                const card = document.createElement("div");
                card.className = "discussion-card";

                card.innerHTML = `
                    <div class="card-header">
                        <span class="timestamp">${d.created_at}</span>
                        <span class="fins-up">${d.fins_up}</span>
                    </div>

                    <p class="question-text">${d.question}</p>
                    <p><strong>Posted by:</strong> ${d.author_email}</p>
                `;

                // Toggle replies button
                const replyBtn = document.createElement("button");
                replyBtn.className = "reply-btn";
                replyBtn.textContent = "View Replies";

                // Hidden reply box
                const replyBox = document.createElement("div");
                replyBox.className = "reply-box hidden";

                replyBtn.addEventListener("click", () => {
                    replyBox.classList.toggle("hidden");
                    replyBtn.textContent = replyBox.classList.contains("hidden")
                        ? "View Replies"
                        : "Hide Replies";
                });

                // Existing replies
                const existingReplies = document.createElement("div");
                existingReplies.className = "existing-replies";

                if (d.replies && d.replies.length > 0) {
                    existingReplies.appendChild(renderReplies(d.replies, d.id, loadDiscussions));
                } else {
                    existingReplies.innerHTML = "<p>No replies yet.</p>";
                }

                // Reply form for replying directly to the question
                const directReplyForm = createReplyForm({
                    discussionId: d.id,
                    parentReplyId: null,
                    onSuccess: loadDiscussions
                });

                replyBox.appendChild(existingReplies);
                replyBox.appendChild(directReplyForm);

                card.appendChild(replyBtn);
                card.appendChild(replyBox);

                discussionSection.appendChild(card);
            });

        } catch (error) {
            console.error("Load discussions error:", error);
            alert("An error occurred while loading discussions.");
        }
    }


    /*
    --------------------------------------------------------
    Create a new discussion question
    --------------------------------------------------------
    */
    document.getElementById("post-question-btn").addEventListener("click", async () => {
        const questionText = document.getElementById("new-question-text").value.trim();

        if (!questionText) {
            alert("Please write a question first.");
            return;
        }

        try {
            const response = await fetch("/api/discussions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    major: major,
                    question: questionText
                })
            });

            const result = await response.json();

            if (!response.ok) {
                alert(result.error || "Failed to create discussion.");
                return;
            }

            document.getElementById("new-question-text").value = "";
            loadDiscussions();

        } catch (error) {
            console.error("Create discussion error:", error);
            alert("An error occurred while creating the discussion.");
        }
    });

    // Initial page load for discussions
    loadDiscussions();
}
</script>

</body>
</html>
