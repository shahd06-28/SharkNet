<!DOCTYPE html>
<html>
<head>
    <title>SharkNet Login</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <img src="../images/nsu.png" class="logo" alt="NSU Logo">

    <div class="login-container">

        <h1>SharkNet</h1>

        <p class="subtitle">
            Connect with fellow NSU students to ask questions,
            share knowledge, and find tutors.
        </p>

        <form action="home.html">

            <label for="email">Please enter your NSU email</label>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="example@mynsu.nova.edu"
                required>

            <button type="submit">Login</button>

        </form>

        <p class="footer-note">
            NSU Students Only • Prototype Version
        </p>

    </div>

</body>
</html>
